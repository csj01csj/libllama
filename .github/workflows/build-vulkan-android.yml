name: Build libggml-vulkan.so (Android arm64-v8a)

# Builds the Vulkan backend .so from the same llama.cpp version used by
# llamatik 0.14.0, so it is ABI-compatible with the existing prebuilt .so files.

on:
  workflow_dispatch:          # run manually from GitHub Actions tab
  push:
    paths:
      - '.github/workflows/build-vulkan-android.yml'

jobs:
  build-vulkan:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. System deps ────────────────────────────────────────────────────────
      - name: Install Vulkan SDK (LunarG) + build tools
        run: |
          # LunarG SDK provides vulkan/vulkan.hpp (C++ headers) not in libvulkan-dev
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build git python3 pkg-config \
            vulkan-sdk

      # ── 3. Android NDK r27c ───────────────────────────────────────────────────
      - name: Setup Android NDK r27c
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Export NDK env vars and add glslc to PATH
        run: |
          NDK_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
          echo "ANDROID_NDK=$NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          # NDK r25+ bundles glslc — add to PATH so sub-builds (vulkan-shaders-gen) find it
          echo "$NDK_PATH/shader-tools/linux-x86_64" >> $GITHUB_PATH

      # ── 4. Find llama.cpp version from llamatik 0.14.0 ────────────────────────
      - name: Clone llamatik v0.14.0 (shallow)
        run: |
          git clone --depth=1 --branch v0.14.0 \
            https://github.com/ferranpons/Llamatik.git llamatik_src

      - name: Extract llama.cpp git ref from llamatik CMakeLists
        id: llama_ref
        run: |
          set -euo pipefail

          # llamatik may embed llama.cpp as a submodule or via FetchContent.
          # Try submodule path first.
          SUBMODULE_DIR=$(find llamatik_src -maxdepth 3 \
            \( -name "llama.cpp" -o -name "ggml" \) -type d | head -1 || true)

          if [ -n "$SUBMODULE_DIR" ] && [ -f "$SUBMODULE_DIR/CMakeLists.txt" ]; then
            echo "Found submodule at $SUBMODULE_DIR"
            # Get the commit that HEAD points to inside the submodule
            REF=$(git -C llamatik_src submodule status -- "$SUBMODULE_DIR" \
              2>/dev/null | awk '{print $1}' | tr -d '-+' || true)
            if [ -n "$REF" ]; then
              echo "llama_ref=$REF" >> $GITHUB_OUTPUT
              echo "llama_is_submodule=true" >> $GITHUB_OUTPUT
              echo "llama_src_dir=$SUBMODULE_DIR" >> $GITHUB_OUTPUT
              echo "Using submodule commit: $REF"
              exit 0
            fi
          fi

          # Fallback: parse FetchContent GIT_TAG from CMakeLists
          CMAKE_FILE=$(find llamatik_src -name "CMakeLists.txt" \
            | xargs grep -l "llama\.cpp\|ggml-org/llama\|GIT_REPOSITORY" 2>/dev/null \
            | head -1 || true)

          if [ -n "$CMAKE_FILE" ]; then
            echo "Parsing $CMAKE_FILE for llama.cpp ref"
            cat "$CMAKE_FILE"
            REF=$(grep -A 5 "GIT_REPOSITORY" "$CMAKE_FILE" \
              | grep "GIT_TAG" \
              | grep -oP '(?<=GIT_TAG\s{0,10})[^\s)]+' \
              | head -1 || true)
            echo "Extracted ref: $REF"
          fi

          if [ -z "${REF:-}" ]; then
            # Hard fallback: llamatik 0.14.0 released 2025-01-31 → llama.cpp ~b4500
            REF="b4500"
            echo "WARNING: Could not determine llama.cpp version, using fallback $REF"
          fi

          echo "llama_ref=$REF" >> $GITHUB_OUTPUT
          echo "llama_is_submodule=false" >> $GITHUB_OUTPUT

      # ── 5. Clone llama.cpp at the matching commit ─────────────────────────────
      - name: Clone llama.cpp
        run: |
          REF="${{ steps.llama_ref.outputs.llama_ref }}"
          IS_SUB="${{ steps.llama_ref.outputs.llama_is_submodule }}"

          if [ "$IS_SUB" = "true" ] && [ -d "${{ steps.llama_ref.outputs.llama_src_dir }}" ]; then
            echo "Using submodule directory already on disk"
            cp -r "${{ steps.llama_ref.outputs.llama_src_dir }}" llama_cpp_src
          else
            echo "Cloning llama.cpp at ref: $REF"
            git clone --depth=1 --branch "$REF" \
              https://github.com/ggml-org/llama.cpp.git llama_cpp_src \
              || git clone --depth=1 \
                https://github.com/ggml-org/llama.cpp.git llama_cpp_src \
              && git -C llama_cpp_src checkout "$REF"
          fi

          echo "llama.cpp HEAD: $(git -C llama_cpp_src rev-parse HEAD 2>/dev/null || echo unknown)"

      # ── 6. Verify glslc is on PATH ────────────────────────────────────────────
      - name: Verify glslc
        run: |
          which glslc
          glslc --version

      # ── 7. CMake configure + build ────────────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake -S llama_cpp_src -B build_vulkan \
            -GNinja \
            -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DGGML_VULKAN=ON \
            -DGGML_NATIVE=OFF \
            -DVulkan_INCLUDE_DIR=/usr/include \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build libggml-vulkan.so
        run: |
          # Build only the Vulkan backend target
          cmake --build build_vulkan --target ggml-vulkan -j$(nproc) \
            || cmake --build build_vulkan --target ggml_vulkan -j$(nproc) \
            || cmake --build build_vulkan -j$(nproc)   # full build as last resort

          echo "=== Built .so files ==="
          find build_vulkan -name "*.so" -type f | sort

      # ── 8. Collect & upload ───────────────────────────────────────────────────
      - name: Collect libggml-vulkan.so
        run: |
          mkdir -p output/arm64-v8a
          find build_vulkan -name "libggml-vulkan.so" -exec cp {} output/arm64-v8a/ \;
          echo "=== Output ==="
          ls -lh output/arm64-v8a/
          file output/arm64-v8a/libggml-vulkan.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libggml-vulkan-android-arm64-v8a
          path: output/arm64-v8a/libggml-vulkan.so
          retention-days: 30
          if-no-files-found: error

      # ── 9. Create GitHub Release (only on manual trigger) ─────────────────────
      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vulkan-build-${{ github.run_number }}
          name: "libggml-vulkan.so (arm64-v8a) — build #${{ github.run_number }}"
          body: |
            Vulkan backend `.so` for Android arm64-v8a, built from llama.cpp
            ref `${{ steps.llama_ref.outputs.llama_ref }}` (same as llamatik 0.14.0).

            **Usage:** drop `libggml-vulkan.so` into `app/src/main/jniLibs/arm64-v8a/`
            alongside the existing prebuilt `.so` files, then set `nGpuLayers > 0`
            in your inference config.
          files: output/arm64-v8a/libggml-vulkan.so
          draft: false
          prerelease: false
